naftiko: 1.0.0-alpha2
info:
  label: Cohere Chat API — Chat
  description: 'Cohere Chat API — Chat. 2 operations. Lead operation: Chat with a Cohere model. Self-contained Naftiko capability
    covering one Cohere business surface.'
  tags:
  - Cohere
  - Chat
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    COHERE_API_KEY: COHERE_API_KEY
capability:
  consumes:
  - type: http
    namespace: chat-chat
    baseUri: https://api.cohere.com
    description: Cohere Chat API — Chat business capability. Self-contained, no shared references.
    resources:
    - name: v2-chat
      path: /v2/chat
      operations:
      - name: chat
        method: POST
        description: Chat with a Cohere model
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: v2-chat-stream
      path: /v2/chat/stream
      operations:
      - name: chatstream
        method: POST
        description: Chat with streaming response
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.COHERE_API_KEY}}'
  exposes:
  - type: rest
    namespace: chat-chat-rest
    port: 8080
    description: REST adapter for Cohere Chat API — Chat. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v2/chat
      name: v2-chat
      description: REST surface for v2-chat.
      operations:
      - method: POST
        name: chat
        description: Chat with a Cohere model
        call: chat-chat.chat
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v2/chat/stream
      name: v2-chat-stream
      description: REST surface for v2-chat-stream.
      operations:
      - method: POST
        name: chatstream
        description: Chat with streaming response
        call: chat-chat.chatstream
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: chat-chat-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cohere Chat API — Chat. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: chat-cohere-model
      description: Chat with a Cohere model
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: chat-chat.chat
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: chat-streaming-response
      description: Chat with streaming response
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: chat-chat.chatstream
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
