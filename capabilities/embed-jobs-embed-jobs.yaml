        description: Create an embed job
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: listembedjobs
        method: GET
        description: List embed jobs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-embed-jobs-id
      path: /v1/embed-jobs/{id}
