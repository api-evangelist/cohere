      name: v1-embed-jobs
      description: REST surface for v1-embed-jobs.
      operations:
      - method: POST
        name: createembedjob
        description: Create an embed job
        call: embed-jobs-embed-jobs.createembedjob
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
