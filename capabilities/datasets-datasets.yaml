naftiko: 1.0.0-alpha2
info:
  label: Cohere Datasets API — Datasets
  description: 'Cohere Datasets API — Datasets. 5 operations. Lead operation: Create a dataset. Self-contained Naftiko capability
    covering one Cohere business surface.'
  tags:
  - Cohere
  - Datasets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    COHERE_API_KEY: COHERE_API_KEY
capability:
  consumes:
  - type: http
    namespace: datasets-datasets
    baseUri: https://api.cohere.com
    description: Cohere Datasets API — Datasets business capability. Self-contained, no shared references.
    resources:
    - name: v1-datasets
      path: /v1/datasets
      operations:
      - name: createdataset
        method: POST
        description: Create a dataset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: listdatasets
        method: GET
        description: List datasets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: datasetType
          in: query
          type: string
          description: Filter datasets by type.
        - name: before
          in: query
          type: string
          description: Filter datasets created before this date.
        - name: after
          in: query
          type: string
          description: Filter datasets created after this date.
        - name: limit
          in: query
          type: integer
          description: Maximum number of datasets to return.
        - name: offset
          in: query
          type: integer
          description: Offset to start returning datasets from.
        - name: validationStatus
          in: query
          type: string
          description: Filter datasets by validation status.
    - name: v1-datasets-usage
      path: /v1/datasets/usage
      operations:
      - name: getdatasetusage
        method: GET
        description: Get dataset usage
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-datasets-id
      path: /v1/datasets/{id}
      operations:
      - name: getdataset
        method: GET
        description: Get a dataset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletedataset
        method: DELETE
        description: Delete a dataset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.COHERE_API_KEY}}'
  exposes:
  - type: rest
    namespace: datasets-datasets-rest
    port: 8080
    description: REST adapter for Cohere Datasets API — Datasets. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/datasets
      name: v1-datasets
      description: REST surface for v1-datasets.
      operations:
      - method: POST
        name: createdataset
        description: Create a dataset
        call: datasets-datasets.createdataset
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: listdatasets
        description: List datasets
        call: datasets-datasets.listdatasets
        with:
          datasetType: rest.datasetType
          before: rest.before
          after: rest.after
          limit: rest.limit
          offset: rest.offset
          validationStatus: rest.validationStatus
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/datasets/usage
      name: v1-datasets-usage
      description: REST surface for v1-datasets-usage.
      operations:
      - method: GET
        name: getdatasetusage
        description: Get dataset usage
        call: datasets-datasets.getdatasetusage
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/datasets/{id}
      name: v1-datasets-id
      description: REST surface for v1-datasets-id.
      operations:
      - method: GET
        name: getdataset
        description: Get a dataset
        call: datasets-datasets.getdataset
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletedataset
        description: Delete a dataset
        call: datasets-datasets.deletedataset
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: datasets-datasets-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cohere Datasets API — Datasets. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: create-dataset
      description: Create a dataset
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: datasets-datasets.createdataset
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: list-datasets
      description: List datasets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: datasets-datasets.listdatasets
      with:
        datasetType: tools.datasetType
        before: tools.before
        after: tools.after
        limit: tools.limit
        offset: tools.offset
        validationStatus: tools.validationStatus
      outputParameters:
      - type: object
        mapping: $.
    - name: get-dataset-usage
      description: Get dataset usage
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: datasets-datasets.getdatasetusage
      outputParameters:
      - type: object
        mapping: $.
    - name: get-dataset
      description: Get a dataset
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: datasets-datasets.getdataset
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-dataset
      description: Delete a dataset
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: datasets-datasets.deletedataset
      outputParameters:
      - type: object
        mapping: $.
