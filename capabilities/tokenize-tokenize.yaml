naftiko: 1.0.0-alpha2
info:
  label: Cohere Tokenize API — Tokenize
  description: 'Cohere Tokenize API — Tokenize. 1 operations. Lead operation: Tokenize text. Self-contained Naftiko capability
    covering one Cohere business surface.'
  tags:
  - Cohere
  - Tokenize
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    COHERE_API_KEY: COHERE_API_KEY
capability:
  consumes:
  - type: http
    namespace: tokenize-tokenize
    baseUri: https://api.cohere.com
    description: Cohere Tokenize API — Tokenize business capability. Self-contained, no shared references.
    resources:
    - name: v1-tokenize
      path: /v1/tokenize
      operations:
      - name: tokenize
        method: POST
        description: Tokenize text
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.COHERE_API_KEY}}'
  exposes:
  - type: rest
    namespace: tokenize-tokenize-rest
    port: 8080
    description: REST adapter for Cohere Tokenize API — Tokenize. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/tokenize
      name: v1-tokenize
      description: REST surface for v1-tokenize.
      operations:
      - method: POST
        name: tokenize
        description: Tokenize text
        call: tokenize-tokenize.tokenize
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: tokenize-tokenize-mcp
    port: 9090
    transport: http
    description: MCP adapter for Cohere Tokenize API — Tokenize. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: tokenize-text
      description: Tokenize text
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: tokenize-tokenize.tokenize
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
