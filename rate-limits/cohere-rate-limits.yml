specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Cohere
providerId: cohere
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - Rate Limiting
  - AI
description: Cohere API rate limits per API key, varies by trial vs production key.
sources:
  - https://cohere.com/pricing
  - https://docs.cohere.com/docs/going-live
headers:
  retryAfter: Retry-After
responseCodes:
  throttled: 429
limits:
  - name: Trial key (Chat)
    scope: key
    metric: requests_per_minute
    limit: 20
    timeFrame: minute
  - name: Trial key (Embed)
    scope: key
    metric: requests_per_minute
    limit: 100
    timeFrame: minute
  - name: Production (Chat)
    scope: key
    metric: requests_per_minute
    limit: 10000
    timeFrame: minute
  - name: Production (Embed)
    scope: key
    metric: requests_per_minute
    limit: 2000
    timeFrame: minute
  - name: Production (Rerank)
    scope: key
    metric: requests_per_minute
    limit: 10000
    timeFrame: minute
