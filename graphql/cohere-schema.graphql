"""
Cohere GraphQL Schema
Provider: Cohere (https://cohere.com)
Docs: https://docs.cohere.com/reference/
GitHub: https://github.com/cohere-ai

Conceptual GraphQL representation of the Cohere REST API surface covering
chat, embeddings, reranking, classification, tokenization, datasets,
connectors, models, and user management.
"""

# ─── Scalars ────────────────────────────────────────────────────────────────

scalar DateTime
scalar JSON
scalar Float32

# ─── Enums ──────────────────────────────────────────────────────────────────

enum EmbedType {
  SEARCH_DOCUMENT
  SEARCH_QUERY
  CLASSIFICATION
  CLUSTERING
  IMAGE
}

enum EmbedJobStatus {
  PROCESSING
  COMPLETE
  FAILED
  CANCELLED
}

enum FinishReason {
  COMPLETE
  STOP_SEQUENCE
  MAX_TOKENS
  TOOL_CALL
  ERROR
}

enum ModelEndpoint {
  CHAT
  EMBED
  RERANK
  CLASSIFY
  GENERATE
  TOKENIZE
  DETOKENIZE
}

enum ConnectorAuthStatus {
  ACTIVE
  PENDING
  ERROR
  NOT_CONFIGURED
}

enum DatasetValidationStatus {
  VALIDATED
  FAILED
  PROCESSING
  UNKNOWN
}

enum ChatMessageRole {
  USER
  ASSISTANT
  SYSTEM
  TOOL
}

enum TruncateOption {
  NONE
  START
  END
}

enum ReturnLikelihoods {
  GENERATION
  ALL
  NONE
}

enum OrganizationUserRole {
  ADMIN
  MEMBER
  VIEWER
}

# ─── Message Types ───────────────────────────────────────────────────────────

"""A generic chat message with a role and content."""
interface Message {
  role: ChatMessageRole!
  content: String
}

"""A message sent by the end user."""
type UserMessage implements Message {
  role: ChatMessageRole!
  content: String
}

"""A message generated by the assistant (model)."""
type AssistantMessage implements Message {
  role: ChatMessageRole!
  content: String
  toolCalls: [ToolCall]
}

"""A system-level instruction message that shapes assistant behavior."""
type SystemMessage implements Message {
  role: ChatMessageRole!
  content: String
}

"""A message containing the result of a tool invocation."""
type ToolMessage implements Message {
  role: ChatMessageRole!
  content: String
  toolCallId: String!
}

# ─── Tool Use ────────────────────────────────────────────────────────────────

"""A parameter definition within a tool's JSON schema."""
type ToolParameter {
  name: String!
  type: String!
  description: String
  required: Boolean
  enum: [String]
}

"""A tool (function) that the model can invoke."""
type Tool {
  name: String!
  description: String!
  parameterDefinitions: [ToolParameter]
}

"""Cohere-native tool definition with full parameter schema."""
type CohereTool {
  name: String!
  description: String!
  parameterDefinitions: JSON
}

"""A tool call requested by the model."""
type ToolCall {
  id: String!
  name: String!
  parameters: JSON
}

"""A streaming delta for a tool call being built up incrementally."""
type ToolCallDelta {
  index: Int
  id: String
  name: String
  parametersDelta: String
}

"""The result returned from executing a tool call."""
type ToolResult {
  call: ToolCall!
  outputs: [JSON]
}

# ─── Chat ────────────────────────────────────────────────────────────────────

"""Input request for the chat endpoint."""
input ChatRequest {
  message: String!
  model: String
  preamble: String
  chatHistory: [ChatHistoryEntry]
  conversationId: String
  promptTruncation: TruncateOption
  connectors: [ConnectorRef]
  searchQueriesOnly: Boolean
  documents: [DocumentInput]
  tools: [ToolInput]
  toolResults: [ToolResultInput]
  temperature: Float
  maxTokens: Int
  maxInputTokens: Int
  k: Int
  p: Float
  seed: Int
  stopSequences: [String]
  frequencyPenalty: Float
  presencePenalty: Float
  stream: Boolean
}

"""A single entry in the chat history passed to the model."""
input ChatHistoryEntry {
  role: ChatMessageRole!
  message: String!
  toolCalls: [ToolCallInput]
}

input ToolCallInput {
  id: String!
  name: String!
  parameters: JSON
}

input ToolInput {
  name: String!
  description: String!
  parameterDefinitions: JSON
}

input ToolResultInput {
  call: ToolCallInput!
  outputs: [JSON]
}

input ConnectorRef {
  id: String!
  options: JSON
}

input DocumentInput {
  id: String
  title: String
  snippet: String
  url: String
  timestamp: String
  data: JSON
}

"""A non-streaming chat response."""
type NonStreamedChatResponse {
  id: String!
  text: String
  generationId: String
  citations: [Citation]
  documents: [Document]
  searchResults: [SearchResult]
  searchQueries: [SearchQuery]
  toolCalls: [ToolCall]
  finishReason: FinishReason
  meta: ResponseMeta
  chatHistory: [AssistantMessage]
}

"""Top-level chat response (alias for non-streamed)."""
type ChatResponse {
  id: String!
  text: String
  generationId: String
  citations: [Citation]
  documents: [Document]
  searchResults: [SearchResult]
  searchQueries: [SearchQuery]
  toolCalls: [ToolCall]
  finishReason: FinishReason
  meta: ResponseMeta
}

"""A streamed (server-sent event) chat response envelope."""
type StreamedChatResponse {
  eventType: String!
  index: Int
  text: String
  toolCallDelta: ToolCallDelta
  searchResults: [SearchResult]
  searchQueries: [SearchQuery]
  documents: [Document]
  citations: [Citation]
  finishReason: FinishReason
  response: NonStreamedChatResponse
  meta: ResponseMeta
}

"""A text generation event within a streamed chat response."""
type StreamingChatTextGeneration {
  index: Int!
  text: String!
}

"""The text portion of a chat response."""
type ChatResponseText {
  text: String!
}

"""Search queries extracted from a chat response."""
type ChatResponseSearchQueries {
  searchQueries: [SearchQuery]
}

"""Citations extracted from a chat response."""
type ChatResponseCitations {
  citations: [Citation]
}

# ─── RAG ─────────────────────────────────────────────────────────────────────

"""A citation linking generated text to source documents."""
type Citation {
  start: Int!
  end: Int!
  text: String!
  documentIds: [String]
  documents: [Document]
}

"""A document retrieved from a connector or provided inline."""
type Document {
  id: String
  title: String
  snippet: String
  url: String
  timestamp: String
  data: JSON
}

"""A search result returned from a connector search."""
type SearchResult {
  searchQuery: SearchQuery
  connector: ConnectorInfo
  documentIds: [String]
  documents: [Document]
  errorMessage: String
}

"""A search query generated by the model for RAG."""
type SearchQuery {
  text: String!
  generationId: String
}

# ─── Text Generation (Legacy Generate) ──────────────────────────────────────

"""Input for the legacy generate endpoint."""
input GenerateRequest {
  prompt: String!
  model: String
  numGenerations: Int
  maxTokens: Int
  truncate: TruncateOption
  temperature: Float
  preset: String
  endSequences: [String]
  stopSequences: [String]
  k: Int
  p: Float
  frequencyPenalty: Float
  presencePenalty: Float
  returnLikelihoods: ReturnLikelihoods
  logitBias: JSON
}

"""Response from the legacy generate endpoint."""
type GenerateResponse {
  id: String!
  generations: [Generation]
  prompt: String
  meta: ResponseMeta
}

"""A single generated text completion."""
type Generation {
  id: String!
  text: String!
  index: Int
  likelihood: Float
  tokenLikelihoods: [LogprobItem]
  finishReason: FinishReason
}

"""A token and its associated likelihood."""
type LogprobItem {
  token: String!
  likelihood: Float
  topTokens: [TokenLikelihood]
}

"""An alternative token considered by the model."""
type TokenLikelihood {
  token: String!
  likelihood: Float!
}

"""A single token from the tokenizer."""
type Token {
  tokenString: String!
  tokenId: Int!
}

# ─── Embeddings ──────────────────────────────────────────────────────────────

"""Input for the embed endpoint."""
input EmbedRequest {
  texts: [String]
  images: [String]
  model: String!
  inputType: EmbedType!
  embeddingTypes: [String]
  truncate: TruncateOption
}

"""Response from the embed endpoint."""
type EmbedResponse {
  id: String!
  embeddings: EmbeddingResult
  texts: [String]
  images: [String]
  meta: ResponseMeta
}

"""Embedding vectors returned in one or more numeric formats."""
type EmbeddingResult {
  float: [[Float]]
  int8: [[Int]]
  uint8: [[Int]]
  binary: [[Int]]
  ubinary: [[Int]]
}

"""A single embedding vector associated with an input text."""
type Embedding {
  index: Int!
  values: [Float]
  inputType: EmbedType
}

"""An asynchronous embed job for batch processing."""
type EmbedJob {
  jobId: String!
  name: String
  status: EmbedJobStatus!
  model: String!
  inputType: EmbedType!
  datasetId: String
  outputDatasetId: String
  createdAt: DateTime
  completedAt: DateTime
  meta: ResponseMeta
}

# ─── Rerank ──────────────────────────────────────────────────────────────────

"""Input for the rerank endpoint."""
input RerankRequest {
  query: String!
  documents: [RerankDocumentInput]!
  model: String
  topN: Int
  rankFields: [String]
  returnDocuments: Boolean
  maxChunksPerDoc: Int
}

"""A document submitted for reranking."""
input RerankDocumentInput {
  text: String
  title: String
  url: String
}

"""Response from the rerank endpoint."""
type RerankResponse {
  id: String!
  results: [RerankResult]
  meta: ResponseMeta
}

"""A single reranked document with its relevance score."""
type RerankResult {
  index: Int!
  relevanceScore: Float!
  document: RerankDocument
}

"""A document returned as part of a rerank result."""
type RerankDocument {
  text: String
  title: String
  url: String
}

# ─── Classify ────────────────────────────────────────────────────────────────

"""Input for the classify endpoint."""
input ClassifyRequest {
  inputs: [String]!
  examples: [ClassifyExampleInput]!
  model: String
  preset: String
  truncate: TruncateOption
}

"""A labeled example used for few-shot classification."""
input ClassifyExampleInput {
  text: String!
  label: String!
}

"""Response from the classify endpoint."""
type ClassifyResponse {
  id: String!
  classifications: [Classification]
  meta: ResponseMeta
}

"""The classification result for a single input."""
type Classification {
  id: String!
  input: String!
  prediction: String!
  confidence: Float!
  labels: [ClassifyLabel]
}

"""A label and its associated confidence score from the classifier."""
type ClassifyLabel {
  label: String!
  confidence: Float!
}

"""A labeled example for classification (output representation)."""
type ClassifyExample {
  text: String!
  label: String!
}

# ─── Tokenize / Detokenize ───────────────────────────────────────────────────

"""Input for the tokenize endpoint."""
input TokenizeRequest {
  text: String!
  model: String!
}

"""Response from the tokenize endpoint."""
type TokenizeResponse {
  tokens: [Int]!
  tokenStrings: [String]!
  meta: ResponseMeta
}

"""Input for the detokenize endpoint."""
input DetokenizeRequest {
  tokens: [Int]!
  model: String!
}

"""Response from the detokenize endpoint."""
type DetokenizeResponse {
  text: String!
  meta: ResponseMeta
}

# ─── Models ──────────────────────────────────────────────────────────────────

"""A Cohere model with its capabilities and context limits."""
type Model {
  name: String!
  endpoints: [ModelEndpoint]
  finetuned: Boolean
  contextLength: Int
  commandRFinetuned: Boolean
  tokenizerUrl: String
  defaultEndpoints: [ModelEndpoint]
  capabilities: [ModelCapability]
}

"""A single capability flag on a model."""
type ModelCapability {
  name: String!
  supported: Boolean!
}

# ─── Datasets ────────────────────────────────────────────────────────────────

"""A dataset stored in Cohere for use with fine-tuning or embed jobs."""
type Dataset {
  id: String!
  name: String!
  schema: String
  datasetType: String
  validationStatus: DatasetValidationStatus
  validationError: String
  createdAt: DateTime
  updatedAt: DateTime
  downloadUrls: [String]
  parts: [DatasetPart]
}

"""Metadata about a part (chunk) of a dataset."""
type DatasetPart {
  id: String!
  name: String
  downloadUrl: String
  numItems: Int
}

"""Validation result for a dataset."""
type DatasetValidation {
  datasetId: String!
  status: DatasetValidationStatus!
  error: String
  warnings: [String]
}

"""A file object associated with a dataset or fine-tuning run."""
type File {
  id: String!
  filename: String!
  sizeBytes: Int
  createdAt: DateTime
  purpose: String
}

# ─── Connectors ──────────────────────────────────────────────────────────────

"""A connector that enables RAG over an external data source."""
type Connector {
  id: String!
  name: String!
  description: String
  url: String
  authType: String
  authStatus: ConnectorAuthStatus
  oauth: ConnectorOAuthConfig
  active: Boolean
  createdAt: DateTime
  updatedAt: DateTime
}

"""OAuth configuration for a connector."""
type ConnectorOAuthConfig {
  clientId: String!
  authorizeUrl: String!
  tokenUrl: String!
  scope: String
}

"""Minimal connector info embedded in search results."""
type ConnectorInfo {
  id: String!
  name: String!
}

# ─── API Keys ────────────────────────────────────────────────────────────────

"""An API key for authenticating requests to the Cohere API."""
type APIKey {
  keyId: String!
  name: String!
  secret: String
  createdAt: DateTime
  lastUsedAt: DateTime
  userId: String
}

# ─── Users and Organization ──────────────────────────────────────────────────

"""A Cohere platform user."""
type User {
  id: String!
  name: String!
  email: String!
  createdAt: DateTime
  organizationId: String
}

"""A user's membership record within an organization."""
type OrganizationUser {
  userId: String!
  organizationId: String!
  role: OrganizationUserRole!
  joinedAt: DateTime
  user: User
}

# ─── Shared / Meta ───────────────────────────────────────────────────────────

"""API response metadata (billing tokens, warnings, version)."""
type ResponseMeta {
  apiVersion: APIVersion
  billedUnits: BilledUnits
  tokens: TokenUsage
  warnings: [String]
}

"""API version information."""
type APIVersion {
  version: String!
  isDeprecated: Boolean
  deprecatedAt: DateTime
}

"""Units billed for a request."""
type BilledUnits {
  inputTokens: Float
  outputTokens: Float
  searchUnits: Float
  classifications: Float
}

"""Token usage breakdown for a request."""
type TokenUsage {
  inputTokens: Int
  outputTokens: Int
}

# ─── Inputs for Mutations ────────────────────────────────────────────────────

"""Input for creating a new batch embed job."""
input EmbedJobInput {
  name: String
  datasetId: String!
  model: String!
  inputType: EmbedType!
  embeddingTypes: [String]
  truncate: TruncateOption
}

"""Input for creating or updating a dataset."""
input DatasetInput {
  name: String!
  type: String!
  data: String
  evalData: String
}

"""Input for creating or updating a connector."""
input ConnectorInput {
  name: String!
  url: String!
  description: String
  authType: String
  oauth: OAuthConfigInput
  active: Boolean
}

"""OAuth configuration input for a connector."""
input OAuthConfigInput {
  clientId: String!
  clientSecret: String!
  authorizeUrl: String!
  tokenUrl: String!
  scope: String
}

# ─── Root Types ──────────────────────────────────────────────────────────────

type Query {
  """Perform a chat completion (non-streaming)."""
  chat(input: ChatRequest!): ChatResponse

  """Generate text using the legacy generate endpoint."""
  generate(input: GenerateRequest!): GenerateResponse

  """Generate vector embeddings for texts or images."""
  embed(input: EmbedRequest!): EmbedResponse

  """Rerank documents by relevance to a query."""
  rerank(input: RerankRequest!): RerankResponse

  """Classify texts using few-shot examples."""
  classify(input: ClassifyRequest!): ClassifyResponse

  """Tokenize text into token IDs and strings."""
  tokenize(input: TokenizeRequest!): TokenizeResponse

  """Detokenize a list of token IDs back into text."""
  detokenize(input: DetokenizeRequest!): DetokenizeResponse

  """List all available Cohere models."""
  listModels: [Model]

  """Retrieve a specific model by name."""
  getModel(modelId: String!): Model

  """List all datasets owned by the caller."""
  listDatasets: [Dataset]

  """Retrieve a specific dataset by ID."""
  getDataset(datasetId: String!): Dataset

  """List all embed jobs."""
  listEmbedJobs: [EmbedJob]

  """Retrieve a specific embed job by ID."""
  getEmbedJob(jobId: String!): EmbedJob

  """List all connectors."""
  listConnectors: [Connector]

  """Retrieve a specific connector by ID."""
  getConnector(connectorId: String!): Connector

  """List API keys for the authenticated user."""
  listAPIKeys: [APIKey]

  """List users in the organization."""
  listOrganizationUsers: [OrganizationUser]
}

type Mutation {
  """Start a batch embed job over a dataset."""
  createEmbedJob(input: EmbedJobInput!): EmbedJob

  """Cancel an in-progress embed job."""
  cancelEmbedJob(jobId: String!): EmbedJob

  """Upload a new dataset."""
  createDataset(input: DatasetInput!): Dataset

  """Delete a dataset by ID."""
  deleteDataset(datasetId: String!): Boolean

  """Register a new connector."""
  createConnector(input: ConnectorInput!): Connector

  """Update an existing connector."""
  updateConnector(connectorId: String!, input: ConnectorInput!): Connector

  """Delete a connector."""
  deleteConnector(connectorId: String!): Boolean

  """Initiate OAuth authorization for a connector."""
  authorizeConnector(connectorId: String!): String

  """Create a new API key."""
  createAPIKey(name: String!): APIKey

  """Delete an API key."""
  deleteAPIKey(keyId: String!): Boolean
}

type Subscription {
  """Stream a chat response token by token via server-sent events."""
  streamChat(input: ChatRequest!): StreamedChatResponse
}
